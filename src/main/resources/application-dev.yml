spring:
  datasource:
    url: jdbc:mysql://localhost:3306/code?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&useUnicode=true&characterEncoding=utf8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 1234
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  sql:
    init:
      mode: never
  jackson:
    serialization:
      fail-on-empty-beans: false

server:
  port: 8081

jwt:
  secret: changeit_replace_in_production_with_secure_value
  expiration-ms: 3600000

